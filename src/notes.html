<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>TabNotes — All Notes</title>
  <style>
    body {
      width: 100%;
      max-width: 640px;
      margin: 0 auto;
      padding: 24px 20px;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .page-header h1 {
      font-size: 18px;
      font-weight: 700;
    }

    .search-input {
      width: 100%;
      padding: 8px 10px;
      font-family: var(--font);
      font-size: 13px;
      color: var(--text);
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      outline: none;
      margin-bottom: 16px;
    }

    .search-input:focus {
      border-color: var(--accent);
    }

    .notes-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .note-card {
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-secondary);
    }

    .note-card-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }

    .note-card-title {
      font-weight: 600;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .note-card-title a {
      color: var(--text);
      text-decoration: none;
    }

    .note-card-title a:hover {
      text-decoration: underline;
    }

    .note-card-body {
      font-size: 12.5px;
      color: var(--text);
      white-space: pre-wrap;
      margin-top: 4px;
    }

    .note-card-meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    .note-card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 6px;
    }

    .note-delete-btn {
      background: none;
      border: none;
      padding: 2px;
      cursor: pointer;
      color: var(--text-muted);
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
      font-size: 14px;
      line-height: 1;
    }

    .note-card:hover .note-delete-btn {
      opacity: 1;
    }

    .note-delete-btn:hover {
      color: var(--text);
    }

    .section-header {
      font-size: 11.5px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 12px 0 4px;
    }

    .section-header:first-child {
      padding-top: 0;
    }

    .empty-state {
      text-align: center;
      color: var(--text-muted);
      padding: 40px 0;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="page-header">
    <h1>All Notes</h1>
  </div>
  <input type="text" id="search" class="search-input" placeholder="Search notes…">
  <div id="notes-list" class="notes-list"></div>

  <script src="notes.js" type="module"></script>
</body>
</html>
